services:
  # ── NestJS API ──────────────────────────────────────────────────────────────
  - type: web
    name: dryzle-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: singapore
    plan: starter
    branch: main
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001

      # Injected from the managed Postgres below
      - key: DATABASE_URL
        fromDatabase:
          name: dryzle-postgres
          property: connectionString

      # Injected from the managed Redis below
      - key: REDIS_URL
        fromService:
          type: redis
          name: dryzle-redis
          property: connectionString

      # Auto-generated secrets
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true

      # Set these manually in the Render dashboard after first deploy
      - key: CORS_ORIGIN
        value: https://dryzle-admin.vercel.app,https://dryzle-customer.vercel.app,https://dryzle-vendor.vercel.app,https://dryzle-delivery.vercel.app

      # Third-party keys — set manually in Render dashboard
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_S3_BUCKET
        sync: false
      - key: AWS_REGION
        value: ap-south-1

  # ── Redis ────────────────────────────────────────────────────────────────────
  - type: redis
    name: dryzle-redis
    plan: starter
    region: singapore
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  - name: dryzle-postgres
    databaseName: dryzle
    user: dryzle_user
    plan: starter
    region: singapore
